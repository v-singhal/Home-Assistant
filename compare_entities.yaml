blueprint:
  name: Compare Two Entities and Notify on Condition Change
  description: Compares two numeric entities and sends a push notification when the comparison condition changes (true→false or false→true)
  domain: automation
  input:
    entity_one:
      name: First Entity
      description: The first numeric entity to compare
      selector:
        entity:
          domain: sensor
    entity_two:
      name: Second Entity
      description: The second numeric entity to compare
      selector:
        entity:
          domain: sensor
    comparison_operator:
      name: Comparison Operator
      description: How to compare the two entities
      selector:
        select:
          options:
            - greater_than
            - less_than
            - equal_to
            - greater_than_or_equal
            - less_than_or_equal
            - not_equal
      default: greater_than
    target_devices:
      name: Target Devices
      description: Devices to send the notification to
      selector:
        entity:
          domain: notify
    notification_title:
      name: Notification Title
      description: Title of the notification
      default: Condition Alert
    notification_message:
      name: Notification Message
      description: Message body. Use placeholders {entity_one}, {entity_two}, {value_one}, {value_two}, {comparison}
      default: "Condition met: {entity_one} {comparison} {entity_two}"
    condition_history:
      name: Condition State Helper
      description: An input_boolean helper to track the previous comparison result
      selector:
        entity:
          domain: input_boolean
    enable_time_condition:
      name: Enable Time Condition
      description: Only send notification within a specific time range
      selector:
        boolean:
      default: false
    time_after:
      name: Time After
      description: Start time for the notification window
      selector:
        time:
      default: "00:00:00"
    time_before:
      name: Time Before
      description: End time for the notification window
      selector:
        time:
      default: "23:59:59"
    enable_day_condition:
      name: Enable Day Condition
      description: Only send notification on specific weekdays
      selector:
        boolean:
      default: false
    weekdays:
      name: Weekdays
      description: Select which days to send notifications
      selector:
        select:
          options:
            - monday
            - tuesday
            - wednesday
            - thursday
            - friday
            - saturday
            - sunday
          multiple: true
      default: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
    enable_value_threshold:
      name: Enable Value Threshold
      description: Add an additional condition on a third entity value
      selector:
        boolean:
      default: false
    threshold_entity:
      name: Threshold Entity
      description: Entity to check for threshold condition
      selector:
        entity:
          domain: sensor
      default: ""
    threshold_operator:
      name: Threshold Operator
      description: How to compare threshold entity
      selector:
        select:
          options:
            - gt
            - lt
            - eq
      default: gt
    threshold_value:
      name: Threshold Value
      description: Value to compare threshold entity against
      default: "0"

trigger:
  - platform: state
    entity_id:
      - !input entity_one
      - !input entity_two

variables:
  val1: "{{ states(config.entity_one) | float(0) }}"
  val2: "{{ states(config.entity_two) | float(0) }}"
  
  # Comparison logic
  comparison_result: >
    {% set op = config.comparison_operator %}
    {% if op == 'greater_than' %}{{ val1 > val2 }}
    {% elif op == 'less_than' %}{{ val1 < val2 }}
    {% elif op == 'equal_to' %}{{ val1 == val2 }}
    {% elif op == 'greater_than_or_equal' %}{{ val1 >= val2 }}
    {% elif op == 'less_than_or_equal' %}{{ val1 <= val2 }}
    {% elif op == 'not_equal' %}{{ val1 != val2 }}
    {% endif %}
  
  comparison_name: >
    {% set op = config.comparison_operator %}
    {% if op == 'greater_than' %}>
    {% elif op == 'less_than' %}<
    {% elif op == 'equal_to' %}==
    {% elif op == 'greater_than_or_equal' %}>=
    {% elif op == 'less_than_or_equal' %}<=
    {% elif op == 'not_equal' %}!=
    {% endif %}
  
  # Previous condition state
  prev_condition_met: "{{ states(config.condition_history) == 'on' }}"
  
  # Condition changed
  condition_changed: "{{ comparison_result != prev_condition_met }}"
  
  # Time condition check
  time_condition_met: >
    {% if config.enable_time_condition %}
      {{ now().time() >= strptime(config.time_after, '%H:%M:%S').time() and 
         now().time() <= strptime(config.time_before, '%H:%M:%S').time() }}
    {% else %}true{% endif %}
  
  # Day condition check
  day_condition_met: >
    {% if config.enable_day_condition %}
      {{ now().strftime('%A').lower() in config.weekdays }}
    {% else %}true{% endif %}
  
  # Threshold condition check
  threshold_condition_met: >
    {% if config.enable_value_threshold and config.threshold_entity != '' %}
      {% set thresh_val = states(config.threshold_entity) | float(0) %}
      {% set thresh_num = config.threshold_value | float(0) %}
      {% set op = config.threshold_operator %}
      {% if op == 'gt' %}{{ thresh_val > thresh_num }}
      {% elif op == 'lt' %}{{ thresh_val < thresh_num }}
      {% elif op == 'eq' %}{{ thresh_val == thresh_num }}
      {% endif %}
    {% else %}true{% endif %}
  
  # Format notification message
  message: >
    {{ config.notification_message
      | replace('{entity_one}', config.entity_one)
      | replace('{entity_two}', config.entity_two)
      | replace('{value_one}', val1 | string)
      | replace('{value_two}', val2 | string)
      | replace('{comparison}', comparison_name)
    }}

condition:
  # Check for valid numeric values
  - condition: template
    value_template: >
      {{ states(config.entity_one) not in ['unknown', 'unavailable', 'none', ''] and
         states(config.entity_two) not in ['unknown', 'unavailable', 'none', ''] }}
  
  # Check if condition changed
  - condition: template
    value_template: "{{ condition_changed }}"
  
  # Check time condition
  - condition: template
    value_template: "{{ time_condition_met }}"
  
  # Check day condition
  - condition: template
    value_template: "{{ day_condition_met }}"
  
  # Check threshold condition
  - condition: template
    value_template: "{{ threshold_condition_met }}"

action:
  # Send notification
  - service: notify.send_message
    target:
      entity_id: !input target_devices
    data:
      title: !input notification_title
      message: "{{ message }}"
  
  # Update helper with new condition state
  - if: "{{ comparison_result }}"
    then:
      - service: input_boolean.turn_on
        target:
          entity_id: !input condition_history
    else:
      - service: input_boolean.turn_off
        target:
          entity_id: !input condition_history
