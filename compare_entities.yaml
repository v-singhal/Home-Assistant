blueprint:
  name: Compare Entities with Device Notifications
  description: Compare two entities and send push notifications to devices based on customizable criteria
  domain: automation
  input:
    entity_one:
      name: First Entity
      description: The first entity to compare
      selector:
        entity:
          domain: sensor
    entity_two:
      name: Second Entity
      description: The second entity to compare
      selector:
        entity:
          domain: sensor
    comparison_operator:
      name: Comparison Operator
      description: How to compare the entities
      selector:
        select:
          options:
            - label: "Greater Than"
              value: "greater_than"
            - label: "Less Than"
              value: "less_than"
            - label: "Equal To"
              value: "equal_to"
            - label: "Greater Than or Equal"
              value: "greater_than_or_equal"
            - label: "Less Than or Equal"
              value: "less_than_or_equal"
            - label: "Not Equal"
              value: "not_equal"
      default: "greater_than"
    target_devices:
      name: Target Devices
      description: Select devices to receive push notifications
      selector:
        target:
          entity:
            domain: notify
    notification_title:
      name: Notification Title
      description: The title of the notification
      selector:
        text:
      default: "Entity Comparison Alert"
    notification_message:
      name: Notification Message
      description: "Use {entity_one}, {entity_two}, {value_one}, {value_two} as placeholders"
      selector:
        text:
          multiline: true
      default: "{entity_one} ({value_one}) is {comparison} {entity_two} ({value_two})"
    enable_time_condition:
      name: Enable Time Condition
      description: Only send notifications during a specific time window
      selector:
        boolean:
      default: false
    time_after:
      name: Time After
      description: Start time for notifications
      selector:
        time:
      default: "08:00:00"
    time_before:
      name: Time Before
      description: End time for notifications
      selector:
        time:
      default: "23:00:00"
    enable_day_condition:
      name: Enable Day Condition
      description: Only send notifications on specific days
      selector:
        boolean:
      default: false
    weekdays:
      name: Days of Week
      description: Select which days to send notifications
      selector:
        select:
          options:
            - label: "Monday"
              value: "mon"
            - label: "Tuesday"
              value: "tue"
            - label: "Wednesday"
              value: "wed"
            - label: "Thursday"
              value: "thu"
            - label: "Friday"
              value: "fri"
            - label: "Saturday"
              value: "sat"
            - label: "Sunday"
              value: "sun"
          multiple: true
      default: ["mon", "tue", "wed", "thu", "fri"]
    enable_throttle:
      name: Enable Notification Throttle
      description: Prevent spamming by throttling notifications
      selector:
        boolean:
      default: false
    throttle_minutes:
      name: Throttle Duration (minutes)
      description: Minimum minutes between notifications
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: "minutes"
      default: 15
    enable_value_threshold:
      name: Enable Value Threshold
      description: Only notify if a numeric value meets a threshold
      selector:
        boolean:
      default: false
    threshold_entity:
      name: Threshold Entity
      description: Entity to check against threshold
      selector:
        entity:
      default: ""
    threshold_operator:
      name: Threshold Operator
      description: Comparison for threshold check
      selector:
        select:
          options:
            - label: "Greater Than"
              value: "gt"
            - label: "Less Than"
              value: "lt"
            - label: "Equal To"
              value: "eq"
      default: "gt"
    threshold_value:
      name: Threshold Value
      description: Numeric value to compare against
      selector:
        number:
          min: -9999
          max: 9999
          step: 0.1
      default: 0

trigger:
  - platform: state
    entity_id:
      - !input entity_one
      - !input entity_two

condition:
  # Main comparison condition
  - condition: template
    value_template: >
      {% set val1 = states(entity_one) | float(none) %}
      {% set val2 = states(entity_two) | float(none) %}
      {% if val1 is none or val2 is none %}
        false
      {% elif comparison == 'greater_than' %}
        {{ val1 > val2 }}
      {% elif comparison == 'less_than' %}
        {{ val1 < val2 }}
      {% elif comparison == 'equal_to' %}
        {{ val1 == val2 }}
      {% elif comparison == 'greater_than_or_equal' %}
        {{ val1 >= val2 }}
      {% elif comparison == 'less_than_or_equal' %}
        {{ val1 <= val2 }}
      {% elif comparison == 'not_equal' %}
        {{ val1 != val2 }}
      {% else %}
        false
      {% endif %}
    enabled: true
  
  # Time condition (optional)
  - condition: time
    after: !input time_after
    before: !input time_before
    enabled: !input enable_time_condition
  
  # Day condition (optional)
  - condition: template
    value_template: >
      {% if not enable_day_condition %}
        true
      {% else %}
        {{ now().strftime('%a').lower()[:3] in weekdays }}
      {% endif %}
    enabled: true
  
  # Value threshold condition (optional)
  - condition: template
    value_template: >
      {% if not enable_value_threshold or threshold_entity == '' %}
        true
      {% else %}
        {% set thresh_val = states(threshold_entity) | float(none) %}
        {% if thresh_val is none %}
          false
        {% elif threshold_operator == 'gt' %}
          {{ thresh_val > threshold_value }}
        {% elif threshold_operator == 'lt' %}
          {{ thresh_val < threshold_value }}
        {% elif threshold_operator == 'eq' %}
          {{ thresh_val == threshold_value }}
        {% else %}
          false
        {% endif %}
      {% endif %}
    enabled: true

action:
  # Throttle check (store last notification time)
  - condition: template
    value_template: >
      {% if not enable_throttle %}
        true
      {% else %}
        {% set last_notification = state_attr('automation.compare_entities_with_device_notifications', 'last_triggered') %}
        {{ (last_notification is none) or ((now() - last_notification).total_seconds() > (throttle_minutes * 60)) }}
      {% endif %}
    enabled: true
  
  # Send notification
  - service: notify.send_message
    target: !input target_devices
    data:
      title: !input notification_title
      message: >
        {% set entity_one_id = entity_one | default('unknown') %}
        {% set entity_two_id = entity_two | default('unknown') %}
        {% set val1 = states(entity_one) | default('N/A') %}
        {% set val2 = states(entity_two) | default('N/A') %}
        {% set op_map = {
          'greater_than': 'is greater than',
          'less_than': 'is less than',
          'equal_to': 'equals',
          'greater_than_or_equal': 'is greater than or equal to',
          'less_than_or_equal': 'is less than or equal to',
          'not_equal': 'is not equal to'
        } %}
        {% set comp_text = op_map[comparison] %}
        {{ message | replace('{entity_one}', entity_one_id) | replace('{entity_two}', entity_two_id) | replace('{value_one}', val1 | string) | replace('{value_two}', val2 | string) | replace('{comparison}', comp_text) }}
