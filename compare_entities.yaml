blueprint:
  name: Compare Entities with Device Notifications
  description: Compare two entities and send push notifications to devices based on customizable criteria
  domain: automation
  input:
    entity_one:
      name: First Entity
      description: The first entity to compare
      selector:
        entity:
          domain: sensor
    entity_two:
      name: Second Entity
      description: The second entity to compare
      selector:
        entity:
          domain: sensor
    comparison_operator:
      name: Comparison Operator
      description: How to compare the entities
      selector:
        select:
          options:
            - label: "Greater Than"
              value: "greater_than"
            - label: "Less Than"
              value: "less_than"
            - label: "Equal To"
              value: "equal_to"
            - label: "Greater Than or Equal"
              value: "greater_than_or_equal"
            - label: "Less Than or Equal"
              value: "less_than_or_equal"
            - label: "Not Equal"
              value: "not_equal"
      default: "greater_than"
    target_devices:
      name: Target Devices
      description: Select devices to receive push notifications
      selector:
        target:
          entity:
            domain: notify
    notification_title:
      name: Notification Title
      description: The title of the notification
      selector:
        text:
      default: "Entity Comparison Alert"
    notification_message:
      name: Notification Message
      description: "Use {entity_one}, {entity_two}, {value_one}, {value_two}, {comparison} as placeholders"
      selector:
        text:
          multiline: true
      default: "{entity_one} ({value_one}) {comparison} {entity_two} ({value_two})"
    enable_time_condition:
      name: Enable Time Condition
      description: Only send notifications during a specific time window
      selector:
        boolean:
      default: false
    time_after:
      name: Time After
      description: Start time for notifications
      selector:
        time:
      default: "08:00:00"
    time_before:
      name: Time Before
      description: End time for notifications
      selector:
        time:
      default: "23:00:00"
    enable_day_condition:
      name: Enable Day Condition
      description: Only send notifications on specific days
      selector:
        boolean:
      default: false
    weekdays:
      name: Days of Week
      description: Select which days to send notifications
      selector:
        select:
          options:
            - label: "Monday"
              value: "mon"
            - label: "Tuesday"
              value: "tue"
            - label: "Wednesday"
              value: "wed"
            - label: "Thursday"
              value: "thu"
            - label: "Friday"
              value: "fri"
            - label: "Saturday"
              value: "sat"
            - label: "Sunday"
              value: "sun"
          multiple: true
      default:
        - "mon"
        - "tue"
        - "wed"
        - "thu"
        - "fri"
    enable_value_threshold:
      name: Enable Value Threshold
      description: Only notify if a numeric value meets a threshold
      selector:
        boolean:
      default: false
    threshold_entity:
      name: Threshold Entity
      description: Entity to check against threshold
      selector:
        entity:
      default: ""
    threshold_operator:
      name: Threshold Operator
      description: Comparison for threshold check
      selector:
        select:
          options:
            - label: "Greater Than"
              value: "gt"
            - label: "Less Than"
              value: "lt"
            - label: "Equal To"
              value: "eq"
      default: "gt"
    threshold_value:
      name: Threshold Value
      description: Numeric value to compare against
      selector:
        number:
          min: -9999
          max: 9999
          step: 0.1
      default: 0

trigger:
  - platform: state
    entity_id:
      - !input entity_one
      - !input entity_two

variables:
  entity_one_var: !input entity_one
  entity_two_var: !input entity_two
  comparison_var: !input comparison_operator
  notification_msg: !input notification_message
  enable_day_var: !input enable_day_condition
  weekdays_var: !input weekdays
  enable_threshold_var: !input enable_value_threshold
  threshold_entity_var: !input threshold_entity
  threshold_operator_var: !input threshold_operator
  threshold_value_var: !input threshold_value
  val1: "{{ states(entity_one_var) | float(none) }}"
  val2: "{{ states(entity_two_var) | float(none) }}"
  comparison_check: >
    {% if val1 is none or val2 is none %}
      false
    {% elif comparison_var == 'greater_than' %}
      {{ val1 > val2 }}
    {% elif comparison_var == 'less_than' %}
      {{ val1 < val2 }}
    {% elif comparison_var == 'equal_to' %}
      {{ val1 == val2 }}
    {% elif comparison_var == 'greater_than_or_equal' %}
      {{ val1 >= val2 }}
    {% elif comparison_var == 'less_than_or_equal' %}
      {{ val1 <= val2 }}
    {% elif comparison_var == 'not_equal' %}
      {{ val1 != val2 }}
    {% else %}
      false
    {% endif %}
  day_check: >
    {% if not enable_day_var %}
      true
    {% else %}
      {{ now().strftime('%a').lower()[:3] in weekdays_var }}
    {% endif %}
  threshold_check: >
    {% if not enable_threshold_var or threshold_entity_var == '' %}
      true
    {% else %}
      {% set thresh_val = states(threshold_entity_var) | float(none) %}
      {% if thresh_val is none %}
        false
      {% elif threshold_operator_var == 'gt' %}
        {{ thresh_val > threshold_value_var }}
      {% elif threshold_operator_var == 'lt' %}
        {{ thresh_val < threshold_value_var }}
      {% elif threshold_operator_var == 'eq' %}
        {{ thresh_val == threshold_value_var }}
      {% else %}
        false
      {% endif %}
    {% endif %}
  op_map:
    greater_than: "is greater than"
    less_than: "is less than"
    equal_to: "equals"
    greater_than_or_equal: "is >= "
    less_than_or_equal: "is <= "
    not_equal: "is not equal to"
  comparison_text: "{{ op_map[comparison_var] }}"
  final_message: >
    {{ notification_msg 
      | replace('{entity_one}', entity_one_var) 
      | replace('{entity_two}', entity_two_var) 
      | replace('{value_one}', val1 | default('N/A') | string) 
      | replace('{value_two}', val2 | default('N/A') | string) 
      | replace('{comparison}', comparison_text) }}

condition:
  # Main comparison condition
  - condition: template
    value_template: "{{ comparison_check | bool(false) }}"
  
  # Time condition (optional)
  - condition: time
    after: !input time_after
    before: !input time_before
    enabled: !input enable_time_condition
  
  # Day condition (optional)
  - condition: template
    value_template: "{{ day_check | bool(true) }}"
  
  # Value threshold condition (optional)
  - condition: template
    value_template: "{{ threshold_check | bool(true) }}"

action:
  - service: notify.send_message
    target: !input target_devices
    data:
      title: !input notification_title
      message: "{{ final_message }}"
