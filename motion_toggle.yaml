blueprint:
  name: Motion-activated Entity with Optional Switches
  description: Turn on an entity when motion is detected. Optionally control extra switches.
  domain: automation

  input:
    motion_entity:
      name: Motion Sensor
      selector:
        entity:
          filter:
            - device_class: occupancy
            - device_class: motion

    target_entity:
      name: Entity to Control
      selector:
        entity:
          filter:
            - domain:
                - light
                - fan
                - switch
                - climate
                - media_player

    optional_switches:
      name: Optional Switches
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: switch

    no_motion_wait:
      name: Wait time
      default: 120
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds
          mode: slider

mode: restart
max_exceeded: silent

variables:
  motion_entity: !input motion_entity
  target_entity: !input target_entity
  optional_switches: !input optional_switches
  no_motion_wait: !input no_motion_wait

trigger:
  - platform: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"

action:
  - service: homeassistant.turn_on
    target:
      entity_id: !input target_entity

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ optional_switches | count > 0 }}"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: "{{ optional_switches }}"

  - wait_for_trigger:
      - platform: state
        entity_id: !input motion_entity
        from: "on"
        to: "off"

  - delay:
      seconds: !input no_motion_wait

  - service: homeassistant.turn_off
    target:
      entity_id: !input target_entity

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ optional_switches | count > 0 }}"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: "{{ optional_switches }}"
