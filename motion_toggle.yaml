blueprint:
  name: Motion-activated Entity with Optional Switches
  description: Turn on any entity when motion is detected. Optionally control switches separately.
  domain: automation
  source_url: https://github.com/home-assistant/core/blob/dev/homeassistant/components/automation/blueprints/motion_light.yaml
  author: Home Assistant

input:
  motion_entity:
    name: Motion Sensor
    selector:
      entity:
        filter:
          - device_class: occupancy
          - device_class: motion

  target_entity:
    name: Entity to Control
    description: Light, fan, switch, climate, or media player
    selector:
      entity:
        filter:
          - domain:
              - light
              - fan
              - switch
              - climate
              - media_player

  optional_switches:
    name: Optional Switches to Control
    description: Additional switches to toggle (leave empty if none)
    default: []
    selector:
      entity:
        multiple: true
        filter:
          - domain: switch

  no_motion_wait:
    name: Wait time
    description: Time to leave the entity on after last motion is detected.
    default: 120
    selector:
      number:
        min: 0
        max: 3600
        unit_of_measurement: seconds
        mode: slider

mode: restart
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"

action:
  - alias: Turn on the main entity
    service: homeassistant.turn_on
    target:
      entity_id: !input target_entity

  - alias: Turn on optional switches
    choose:
      - conditions:
          - condition: template
            value_template: "{{ (optional_switches | default([]) | count) > 0 }}"
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: !input optional_switches

  - alias: Wait until there is no motion from device
    wait_for_trigger:
      - platform: state
        entity_id: !input motion_entity
        from: "on"
        to: "off"

  - alias: Wait the number of seconds that has been set
    delay: !input no_motion_wait

  - alias: Turn off the main entity
    service: homeassistant.turn_off
    target:
      entity_id: !input target_entity

  - alias: Turn off optional switches
    choose:
      - conditions:
          - condition: template
            value_template: "{{ (optional_switches | default([]) | count) > 0 }}"
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: !input optional_switches
